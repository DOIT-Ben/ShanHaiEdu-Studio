name: quality-gates

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality-gates:
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install locked dependencies
        run: npm ci
      - name: Run SHA-bound verification
        run: npm run verify:ci
      - name: Preserve verification manifest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: development-verification-${{ github.sha }}
          path: .tmp/verification/development-verification.json
          if-no-files-found: warn
