name: quality-gates

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality-gates:
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install real media dependencies
        run: choco install ffmpeg libreoffice-fresh --yes --no-progress
      - name: Expose real media binaries
        shell: pwsh
        run: |
          $ffmpeg = (Get-Command ffmpeg.exe -ErrorAction Stop).Source
          $ffprobe = (Get-Command ffprobe.exe -ErrorAction Stop).Source
          $libreOfficeDir = Join-Path $env:ProgramFiles "LibreOffice\program"
          $soffice = Join-Path $libreOfficeDir "soffice.exe"
          if (-not (Test-Path -LiteralPath $soffice -PathType Leaf)) {
            throw "LibreOffice installation did not provide soffice.exe"
          }
          "FFMPEG_PATH=$ffmpeg" >> $env:GITHUB_ENV
          "FFPROBE_PATH=$ffprobe" >> $env:GITHUB_ENV
          "LIBREOFFICE_BIN=$soffice" >> $env:GITHUB_ENV
          $libreOfficeDir >> $env:GITHUB_PATH
      - name: Install locked dependencies
        run: npm ci
      - name: Run SHA-bound verification
        run: npm run verify:ci
      - name: Preserve verification manifest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: development-verification-${{ github.sha }}
          path: .tmp/verification/development-verification.json
          if-no-files-found: warn
